name: Kamaraj Security Audit

# 🛡️ THE API CONTRACT: This allows Flask to send data to GitHub
on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'The live URL to scan with ZAP'
        required: false
        default: ''
  push:
    branches: [ "main" ]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # --- STEP 1: STATIC ANALYSIS (SAST) ---
      - name: 🐍 Python Static Analysis (Bandit)
        run: |
          pip install bandit
          # Scan the 'src' folder specifically
          bandit -r src/ -f txt > python_report.txt || true

      - name: ☕ Java Static Analysis
        run: |
          # Simple grep to find hardcoded passwords or secrets
          grep -rE "password|secret|key" src/ || true

      # --- STEP 2: DYNAMIC ANALYSIS (DAST) ---
      # This ONLY runs if you typed a URL into your Flask Portal
      - name: 🌐 ZAP Web Audit
        if: "${{ github.event.inputs.target_url != '' }}"
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "${{ github.event.inputs.target_url }}"
          fail_action: false
          # ✅ Add this line to force the filename
          report_name: 'zap_report'

     # --- STEP 3: ARTIFACT UPLOAD ---
      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: kamaraj-security-reports
          path: |
            python_report.txt
            zap_report.html
            report_html.html
