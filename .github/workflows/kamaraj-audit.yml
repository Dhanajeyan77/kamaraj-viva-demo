name: Kamaraj Security Audit
on: [workflow_dispatch, push]

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Python Static Analysis (Bandit)
        run: |
          pip install bandit
          # Scan the 'src' folder and save results
          bandit -r src/ -f txt > python_report.txt || true

      - name: ☕ Java Static Analysis
        run: |
          # Simple check for hardcoded secrets in Java
          grep -rnE "password|secret|key" src/*.java > java_report.txt || true

      - name: 🌐 Live URL Scan (ZAP)
        uses: zaproxy/action-baseline@v0.12.0
        with:
          # Replace with a test URL like 'https://www.google.com' for the demo
          target: 'https://www.google.com' 

      - name: 📤 Upload Reports
        uses: actions/upload-artifact@v4
        with:
          name: kamaraj-viva-reports
          path: |
            python_report.txt
            java_report.txt